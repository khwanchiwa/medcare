services:
  ocr:
    image: pj_ocr69-ocr:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pj_ocr69-ocr
    working_dir: /app
    restart: on-failure
    ports:
      - "127.0.0.1:8001:8001"
    environment:
      PYTHONUNBUFFERED: "1"
      OLLAMA_HOST: "http://host.docker.internal:11434"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health/ready', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
